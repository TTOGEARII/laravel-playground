services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            # 보안: 호스트의 127.0.0.1(로컬)에만 바인딩해 외부 네트워크 노출을 막는다.
            # 서버에서는 리버스 프록시가 localhost 로 접근하므로 외부 직접 접속만 차단된다.
            - '127.0.0.1:${APP_PORT:-80}:80'
            - '127.0.0.1:${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            TZ: '${TZ:-Asia/Seoul}'
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - selenium
    mysql:
        image: 'mysql:8.4'
        # default-time-zone(+09:00)은 tz 테이블 없이도 NOW()/CURRENT_TIMESTAMP 를 KST 로 맞춘다.
        command: --mysql-native-password=ON --default-time-zone=+09:00
        ports:
            # 보안: DB 포트는 호스트 로컬에서만 접근(외부 직접 접속 차단).
            - '127.0.0.1:${FORWARD_DB_PORT:-3306}:3306'
        environment:
            TZ: '${TZ:-Asia/Seoul}'
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        environment:
            TZ: '${TZ:-Asia/Seoul}'
        ports:
            # 보안: Redis 포트는 호스트 로컬에서만 접근(외부 직접 접속 차단).
            - '127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    selenium:
        image: 'selenium/standalone-chromium'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            TZ: '${TZ:-Asia/Seoul}'
        ports:
            # 보안: Selenium(WebDriver 4444)·noVNC(7900) 모두 호스트 로컬에서만 접근.
            - '127.0.0.1:4444:4444'
            - '127.0.0.1:7900:7900'
        volumes:
            - '/dev/shm:/dev/shm'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
