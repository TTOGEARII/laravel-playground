<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오프라인 — 가시있음</title>
    <!-- 오프라인 폴백: 외부 리소스를 못 불러오는 상황이므로 스타일은 전부 인라인(디자인 토큰 값 하드카피) -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #121212; color: #ffffff;
            font-family: 'Figtree', 'Helvetica Neue', 'Noto Sans KR', sans-serif;
            text-align: center; padding: 24px;
        }
        .box { max-width: 360px; }
        .emoji { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 0.875rem; color: #b3b3b3; line-height: 1.6; margin-bottom: 24px; }
        button {
            padding: 12px 28px; border: none; border-radius: 9999px;
            background: #f3727f; color: #ffffff;
            font-size: 0.875rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="emoji">📡</div>
        <h1>인터넷 연결이 끊겼어요</h1>
        <p>가격비교·리딤코드·레이드 정보는 실시간 데이터라 연결이 필요합니다.<br>연결을 확인하고 다시 시도해 주세요.</p>
        <button onclick="location.reload()">다시 시도</button>
    </div>
</body>
</html>
